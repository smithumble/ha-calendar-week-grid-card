      ha-color-on-neutral-loud: '#fbf1c7'
      ha-color-on-primary-quiet: '#689d6a'
      ha-color-on-primary-normal: '#8ec07c'
      ha-dialog-surface-background: '#282828'
      ha-color-shadow-scrollable-fade: 'rgba(0, 0, 0, 0.35)'
      # WebAwesome direct overrides (used when semantic chain is incomplete)
